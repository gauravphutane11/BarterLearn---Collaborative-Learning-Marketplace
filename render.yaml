services:
  - type: web
    name: barterlearn-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: barterlearn-db
          property: connectionString

databases:
  - name: barterlearn-db
    plan: free
